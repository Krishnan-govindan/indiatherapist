name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── API typecheck ────────────────────────────────────────────────────────────
  api:
    name: API — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Web typecheck & build ────────────────────────────────────────────────────
  web:
    name: Web — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    # Provide stub env vars so Next.js build doesn't fail on missing NEXT_PUBLIC_*
    env:
      NEXT_PUBLIC_APP_URL: https://www.indiatherapist.com
      NEXT_PUBLIC_API_URL: https://api.indiatherapist.com
      NEXT_PUBLIC_ADMIN_SECRET: ci-stub
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_stub

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
